<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conciliador BROU</title>
  <style>
    :root{
      --bg:#0f172a; --text:#f8fafc; --muted:#94a3b8; --border:rgba(255,255,255,.12);
      --green:#22c55e; --blue:#38bdf8; --yellow:#facc15; --card:#111827;
      --radius:22px;
    }
    *{box-sizing:border-box;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}
    body{
      margin:0;min-height:100vh;color:var(--text);
      background:radial-gradient(circle at top left,rgba(56,189,248,.18),transparent 35%),
                 radial-gradient(circle at bottom right,rgba(34,197,94,.16),transparent 35%),
                 var(--bg);
    }
    .wrap{max-width:1120px;margin:0 auto;padding:42px 22px 70px}
    h1{font-size:clamp(34px,5vw,58px);line-height:1;margin:0;letter-spacing:-.04em}
    .sub{color:var(--muted);font-size:18px;max-width:820px;line-height:1.5;margin:16px 0 28px}
    .panel{
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));
      border:1px solid var(--border);border-radius:var(--radius);padding:24px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .coin{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:18px;padding:18px}
    .coin h2{margin:0 0 12px;font-size:28px}
    .usd h2{color:var(--blue)} .uyu h2{color:var(--green)} .eur h2{color:var(--yellow)}
    label{display:block;color:#cbd5e1;font-size:13px;margin:14px 0 7px}
    input[type=file]{width:100%;padding:12px;border:1px dashed rgba(255,255,255,.25);border-radius:13px;background:#0b1220;color:var(--muted)}
    button{
      margin-top:24px;width:100%;border:0;border-radius:16px;padding:16px 18px;
      font-size:16px;font-weight:900;cursor:pointer;color:#04111f;
      background:linear-gradient(90deg,var(--blue),var(--green),var(--yellow));
      box-shadow:0 16px 36px rgba(0,0,0,.35)
    }
    button:disabled{opacity:.55;cursor:not-allowed}
    .status{margin-top:16px;color:var(--muted);min-height:24px;white-space:pre-wrap}
    .hint{margin-top:22px;color:#cbd5e1;background:rgba(255,255,255,.045);border:1px solid var(--border);border-radius:16px;padding:16px;line-height:1.5}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Conciliador BROU</h1>
    <p class="sub">Subís los 3 pares de archivos de fin de mes — SAP + Banco para USD, UYU y EUR — y descargás un ZIP con todos los Excel conciliados.</p>

    <form class="panel" id="form">
      <div class="grid">
        <section class="coin usd">
          <h2>USD</h2>
          <label>SAP USD</label>
          <input name="sap_usd" type="file" accept=".xlsx,.xls" required>
          <label>Banco USD</label>
          <input name="banco_usd" type="file" accept=".xlsx,.xls" required>
        </section>

        <section class="coin uyu">
          <h2>UYU</h2>
          <label>SAP UYU</label>
          <input name="sap_uyu" type="file" accept=".xlsx,.xls" required>
          <label>Banco UYU</label>
          <input name="banco_uyu" type="file" accept=".xlsx,.xls" required>
        </section>

        <section class="coin eur">
          <h2>EUR</h2>
          <label>SAP EUR</label>
          <input name="sap_eur" type="file" accept=".xlsx,.xls" required>
          <label>Banco EUR</label>
          <input name="banco_eur" type="file" accept=".xlsx,.xls" required>
        </section>
      </div>

      <button id="btn" type="submit">Conciliar los 3 bancos</button>
      <div class="status" id="status"></div>

      <div class="hint">
        Resultado: <strong>CONCILIACIONES_BROU.zip</strong> con SAP y Banco conciliados por moneda + resumen de ejecución.
      </div>
    </form>
  </div>

  <script>
    const form = document.getElementById("form");
    const statusEl = document.getElementById("status");
    const btn = document.getElementById("btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      statusEl.textContent = "Procesando archivos...";

      try {
        const fd = new FormData(form);
        const res = await fetch("/conciliar", { method: "POST", body: fd });

        if (!res.ok) {
          let msg = "Error procesando la conciliación.";
          try {
            const data = await res.json();
            msg = data.error || msg;
          } catch {}
          throw new Error(msg);
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "CONCILIACIONES_BROU.zip";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        statusEl.textContent = "Listo. ZIP descargado.";
      } catch (err) {
        statusEl.textContent = err.message;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
